repos:
  - repo: local
    hooks:
      - id: swift-format
        name: Format Swift files with swift-format
        entry: xcrun swift-format format --in-place --configuration .swift-format
        language: system
        types: [swift]

      - id: clang-format
        name: Format Objective-C/C files with clang-format
        entry: xcrun clang-format -i
        language: system
        files: '\.(c|cc|cpp|h|hpp|m|mm)$'
